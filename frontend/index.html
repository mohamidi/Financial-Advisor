<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Financial Advisor</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --text:#e7e9ee; --muted:#9aa3b2;
          --user:#2b6cff; --accent:#4ade80; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--text); height:100vh; display:flex; }
  .center { margin:auto; width:100%; max-width:420px; padding:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:14px; margin:0 0 20px; }
  label { display:block; font-size:13px; color:var(--muted); margin:12px 0 6px; }
  input { width:100%; padding:11px 12px; background:#12141a; border:1px solid var(--line);
          border-radius:9px; color:var(--text); font-size:15px; }
  button { cursor:pointer; border:none; border-radius:9px; font-size:15px; font-weight:600; }
  .primary { width:100%; margin-top:20px; padding:12px; background:var(--user); color:#fff; }
  .primary:disabled { opacity:.5; cursor:default; }
  .err { color:#ff6b6b; font-size:13px; margin-top:12px; min-height:16px; }

  /* Chat */
  #chat { display:none; flex-direction:column; width:100%; max-width:720px; height:100vh;
          margin:0 auto; }
  .top { display:flex; align-items:center; justify-content:space-between; padding:14px 18px;
         border-bottom:1px solid var(--line); }
  .top h1 { font-size:16px; }
  .link { background:none; color:var(--muted); font-weight:500; font-size:13px; padding:6px; }
  #messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width:80%; padding:11px 14px; border-radius:14px; line-height:1.5; font-size:15px;
         white-space:pre-wrap; word-wrap:break-word; }
  .msg.user { align-self:flex-end; background:var(--user); color:#fff; border-bottom-right-radius:4px; }
  .msg.assistant { align-self:flex-start; background:#20242d; border:1px solid var(--line);
                   border-bottom-left-radius:4px; }
  .msg strong { font-weight:700; }
  .hint { color:var(--muted); font-size:13px; text-align:center; margin:auto 0; }
  .composer { display:flex; gap:10px; padding:14px 18px; border-top:1px solid var(--line); }
  .composer input { flex:1; }
  .composer button { padding:0 18px; background:var(--accent); color:#0f1115; }
  .composer button:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>

<!-- Supabase URL + publishable ("anon") key are safe in client code by design: they carry no
     privileges on their own - data access is gated by the user's JWT + Row Level Security. -->
<div id="login" class="center">
  <div class="card">
    <h1>Financial Advisor</h1>
    <p class="sub">Sign in to ask about your money.</p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" />
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" />
    <button id="loginBtn" class="primary">Log in</button>
    <div id="loginErr" class="err"></div>
  </div>
</div>

<div id="chat">
  <div class="top">
    <h1>Financial Advisor</h1>
    <button id="logoutBtn" class="link">Log out</button>
  </div>
  <div id="messages">
    <div class="hint">Ask me things like "can I afford a $3,000 trip?" or "how much did I spend on dining?"</div>
  </div>
  <div class="composer">
    <input id="input" placeholder="Ask a question..." autocomplete="off" />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://mprpzglnwacskwclwtzi.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_vd8UuLwpcBF38WE6yODYag_0T_mjMhU";

  // Kept in memory only (not localStorage) so a stolen-script/XSS can't lift a persisted token;
  // the tradeoff is re-login on refresh, acceptable for now.
  let accessToken = null;
  let history = [];

  const $ = (id) => document.getElementById(id);

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  // Minimal, safe formatting: escape first, then render **bold** only.
  function render(text) {
    return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  }

  function addBubble(role, text) {
    const hint = $("messages").querySelector(".hint");
    if (hint) hint.remove();
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.innerHTML = render(text);
    $("messages").appendChild(div);
    $("messages").scrollTop = $("messages").scrollHeight;
  }

  async function login() {
    const email = $("email").value.trim();
    const password = $("password").value;
    $("loginErr").textContent = "";
    $("loginBtn").disabled = true;
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { "apikey": SUPABASE_PUBLISHABLE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) { $("loginErr").textContent = "Login failed - check your email and password."; return; }
      const data = await res.json();
      accessToken = data.access_token;
      $("login").style.display = "none";
      $("chat").style.display = "flex";
      $("input").focus();
    } catch (e) {
      $("loginErr").textContent = "Network error - please try again.";
    } finally {
      $("loginBtn").disabled = false;
    }
  }

  async function send() {
    const message = $("input").value.trim();
    if (!message) return;
    addBubble("user", message);
    $("input").value = "";
    $("sendBtn").disabled = true;
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Authorization": `Bearer ${accessToken}`, "Content-Type": "application/json" },
        body: JSON.stringify({ history, message }),
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) { addBubble("assistant", "Sorry, something went wrong. Please try again."); return; }
      const data = await res.json();
      history = data.history;
      addBubble("assistant", data.reply);
    } catch (e) {
      addBubble("assistant", "Network error - please try again.");
    } finally {
      $("sendBtn").disabled = false;
      $("input").focus();
    }
  }

  function logout() {
    accessToken = null;
    history = [];
    $("chat").style.display = "none";
    $("login").style.display = "flex";
    $("messages").innerHTML = '<div class="hint">Ask me things like "can I afford a $3,000 trip?" or "how much did I spend on dining?"</div>';
    $("password").value = "";
  }

  $("loginBtn").addEventListener("click", login);
  $("password").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
  $("sendBtn").addEventListener("click", send);
  $("input").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
  $("logoutBtn").addEventListener("click", logout);
</script>
</body>
</html>
